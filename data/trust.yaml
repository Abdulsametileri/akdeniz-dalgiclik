# "Neden Akdeniz Dalgıçlık?" güven unsurları. Abartısız, doğrulanabilir ifadeler.
items:
  - icon: site
    title: Saha Tecrübesi
    text: Liman, iskele, gemi ve endüstriyel tesislerde yürütülen sualtı saha çalışmaları.

  - icon: camera
    title: Görsel Raporlama
    text: Yapılan işler fotoğraf ve video ile kayıt altına alınarak iş öncesi/sonrası değerlendirme desteklenir.

  - icon: chat
    title: Hızlı İletişim
    text: WhatsApp ve telefon üzerinden hızlı ulaşım, ihtiyaç ve saha koşullarına göre net geri dönüş.

  - icon: clipboard
    title: İş Öncesi Keşif
    text: Çalışmaya başlamadan önce sualtı durumunun değerlendirilmesi ve iş kapsamının netleştirilmesi.
