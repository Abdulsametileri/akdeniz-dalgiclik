# "Neden Akdeniz Dalgıçlık?" güven unsurları. Abartısız, doğrulanabilir ifadeler.
items:
  - icon: clipboard
    title: 1. Sınıf Sanayi Dalgıcı Ehliyeti
    text: Operasyonlar 1. Sınıf Sanayi Dalgıcı yetkinliğiyle, ilgili mevzuata uygun şekilde yürütülür.

  - icon: wrench
    title: Tam Donanımlı Ekipman
    text: Yüksek basınçlı su jetleri, güçlü kum pompaları ve sualtı kaynak makineleriyle saha çalışması.

  - icon: anchor
    title: Turizm & Marina Odaklı Yaklaşım
    text: Otel misafir konforunu ve marina operasyon hızını gözeten esnek çalışma saatleri.

  - icon: phone
    title: 7/24 Acil Müdahale
    text: İhtiyaç anında Antalya ve çevre bölgelerde hızla sahada yer alma.
