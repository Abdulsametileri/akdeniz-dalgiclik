baseURL = 'https://akdenizdalgiclik.com/'
languageCode = 'tr-tr'
defaultContentLanguage = 'tr'
title = 'Akdeniz Dalgıçlık'
enableRobotsTXT = true
enableGitInfo = false

# Boş/ince taksonomi sayfaları üretilmesin (SEO temizliği)
disableKinds = ['taxonomy', 'term', 'rss']

# Build hygiene
[build]
  writeStats = false

[minify]
  minifyOutput = true

# Image processing defaults (Hugo extended)
[imaging]
  quality = 80
  resampleFilter = 'Lanczos'
  [imaging.exif]
    disableDate = true
    disableLatLong = true

# ─────────────────────────────────────────────────────────────
# Site parameters — TEK KAYNAK. İletişim bilgilerini buradan düzenleyin.
# ─────────────────────────────────────────────────────────────
[params]
  brand = 'Akdeniz Dalgıçlık'
  tagline = 'Sanayi Dalgıçlığı & Sualtı Hizmetleri'
  description = 'Akdeniz Dalgıçlık; Tekne/yat/gemi altı temizlik, Sualtı kaynak ve sualtı kesim'

  # phoneDisplay: ekranda görünen format. phoneDial: tel: linki (sadece rakam, +90).
  phoneDisplay = '+90 533 168 18 47'
  phoneDial = '+905331681847'
  # İkincil telefon hattı (footer iletişim bölümünde gösterilir).
  phoneDisplay2 = '+90 539 559 48 21'
  phoneDial2 = '+905395594821'

  # WhatsApp — wa.me için ülke kodlu rakam (başında + YOK, boşluk YOK).
  # whatsappNumber  = birincil hat → TÜM CTA butonları (sabit buton, hero, header, footer, CTA, hizmetler) bunu kullanır.
  # whatsappNumber2 = ikincil hat → yalnız İletişim sayfasında ikinci kart.
  # whatsappDisplay* = İletişim kartlarında görünen okunabilir format.
  whatsappNumber = '905331681847'
  whatsappDisplay = '+90 533 168 18 47'
  whatsappNumber2 = '905395594821'
  whatsappDisplay2 = '+90 539 559 48 21'

  email = 'fatihsultanmutlu@gmail.com'

  # WhatsApp'a tıklanınca önceden dolacak mesaj
  whatsappMessage = 'Merhaba, sualtı işim için keşif / teklif almak istiyorum.'

  # Open Graph / sosyal paylaşım görseli kaynağı (assets/images altında)
  ogImage = 'sualti-kaynak-kesim-02.jpg'

# ─────────────────────────────────────────────────────────────
# Menü
# ─────────────────────────────────────────────────────────────
[menus]
  [[menus.main]]
    name = 'Ana Sayfa'
    pageRef = '/'
    weight = 10
  [[menus.main]]
    name = 'Hizmetler'
    pageRef = '/hizmetler'
    weight = 20
  [[menus.main]]
    name = 'Galeri'
    pageRef = '/galeri'
    weight = 30
  [[menus.main]]
    name = 'İletişim'
    pageRef = '/iletisim'
    weight = 40

[markup]
  [markup.goldmark.renderer]
    unsafe = true
  [markup.highlight]
    noClasses = true

[sitemap]
  changefreq = 'monthly'
  priority = 0.5
  filename = 'sitemap.xml'
