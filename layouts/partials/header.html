{{- $wa := partial "wa-url.html" . -}}
<header class="site-header">
  <div class="container header-inner">
    <a class="brand" href="/" aria-label="{{ site.Params.brand }} ana sayfa">
      <svg class="brand-mark" viewBox="0 0 40 40" width="38" height="38" aria-hidden="true">
        <rect width="40" height="40" rx="10" fill="#071827"/>
        <circle cx="27.5" cy="12.5" r="3.8" fill="#F97316"/>
        <path d="M5 25c3 0 3-2.2 6-2.2s3 2.2 6 2.2 3-2.2 6-2.2 3 2.2 6 2.2 3-2.2 4-2.2" fill="none" stroke="#0EA5E9" stroke-width="2.4" stroke-linecap="round"/>
        <path d="M5 30.5c3 0 3-2.2 6-2.2s3 2.2 6 2.2 3-2.2 6-2.2 3 2.2 6 2.2 3-2.2 4-2.2" fill="none" stroke="#F8FAFC" stroke-width="2" stroke-linecap="round" opacity=".65"/>
      </svg>
      <span class="brand-text"><strong>Akdeniz</strong>&nbsp;Dalgıçlık</span>
    </a>

    <input type="checkbox" id="nav-toggle" class="nav-toggle" hidden>
    <label for="nav-toggle" class="nav-burger" aria-label="Menüyü aç / kapat">
      <span class="burger-i burger-open">{{ partial "icon.html" (dict "name" "menu") }}</span>
      <span class="burger-i burger-close">{{ partial "icon.html" (dict "name" "close") }}</span>
    </label>

    <nav class="site-nav" aria-label="Ana menü">
      <ul class="nav-list">
        {{- range site.Menus.main }}
        <li><a href="{{ .URL }}"{{ if $.IsMenuCurrent "main" . }} aria-current="page"{{ end }}>{{ .Name }}</a></li>
        {{- end }}
      </ul>
      <a class="btn btn-wa btn-sm nav-cta" href="{{ $wa }}" target="_blank" rel="noopener">
        {{ partial "icon.html" (dict "name" "whatsapp" "size" 18) }}<span>WhatsApp</span>
      </a>
    </nav>
  </div>
</header>
