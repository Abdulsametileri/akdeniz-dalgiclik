{{- $wa := partial "wa-url.html" . -}}
<header class="site-header">
  <div class="container header-inner">
    <a class="brand" href="/" aria-label="{{ site.Params.brand }} ana sayfa">
      {{- with resources.Get "images/logo.png" }}
      {{- $m := .Resize "128x webp q85 Lanczos" }}
      <img class="brand-mark" src="{{ $m.RelPermalink }}" width="54" height="55" alt="{{ site.Params.brand }} logo" loading="eager" decoding="async" fetchpriority="high">
      {{- end }}
      <span class="brand-text"><strong>Akdeniz &nbsp;Dalgıçlık</strong></span>
    </a>

    <input type="checkbox" id="nav-toggle" class="nav-toggle" hidden>
    <label for="nav-toggle" class="nav-burger" aria-label="Menüyü aç / kapat">
      <span class="burger-i burger-open">{{ partial "icon.html" (dict "name" "menu") }}</span>
      <span class="burger-i burger-close">{{ partial "icon.html" (dict "name" "close") }}</span>
    </label>

    <nav class="site-nav" aria-label="Ana menü">
      <ul class="nav-list">
        {{- range site.Menus.main }}
        <li><a href="{{ .URL }}"{{ if $.IsMenuCurrent "main" . }} aria-current="page"{{ end }}>{{ .Name }}</a></li>
        {{- end }}
      </ul>
      <a class="btn btn-wa btn-sm nav-cta" href="{{ $wa }}" target="_blank" rel="noopener">
        {{ partial "icon.html" (dict "name" "whatsapp" "size" 18) }}<span>WhatsApp</span>
      </a>
    </nav>
  </div>
</header>
